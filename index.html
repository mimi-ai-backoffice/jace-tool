<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JACE 採取・移植図ツール（試作）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #fff; font-family: 'Hiragino Sans', sans-serif; min-height: 100vh; }

  header { background: #111; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
  header h1 { font-size: 16px; color: #d4a84b; font-weight: bold; }
  header .badge { background: #d4a84b; color: #111; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

  .mode-switch { display: flex; gap: 8px; padding: 12px 16px; }
  .mode-btn { flex: 1; padding: 10px; border: 2px solid #444; background: #222; color: #aaa; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
  .mode-btn.active { border-color: #d4a84b; background: #2a2000; color: #d4a84b; font-weight: bold; }

  .toolbar { display: flex; gap: 8px; padding: 8px 16px; align-items: center; background: #111; border-bottom: 1px solid #333; flex-wrap: wrap; }
  .toolbar-section { display: flex; gap: 6px; align-items: center; }
  .toolbar-label { font-size: 11px; color: #888; min-width: 28px; }

  .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all 0.15s; }
  .color-btn.active { border-color: #fff; transform: scale(1.2); }

  .size-btn { padding: 4px 10px; background: #333; color: #aaa; border: 2px solid transparent; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .size-btn.active { border-color: #d4a84b; color: #d4a84b; }

  .tool-btn { padding: 6px 12px; background: #333; color: #aaa; border: 2px solid transparent; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .tool-btn.active { border-color: #d4a84b; color: #d4a84b; }

  .action-btn { padding: 6px 14px; background: #444; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .action-btn:hover { background: #555; }
  .action-btn.primary { background: #d4a84b; color: #111; font-weight: bold; }
  .action-btn.primary:hover { background: #e8c060; }
  .action-btn.danger { background: #c0392b; }

  .divider { width: 1px; height: 28px; background: #444; margin: 0 4px; }

  .canvas-wrap { display: flex; justify-content: center; padding: 16px; overflow: auto; }
  canvas { border-radius: 8px; }

  .legend { padding: 10px 16px; display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: #aaa; background: #111; border-top: 1px solid #333; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; }

  .hint { text-align: center; padding: 8px; font-size: 12px; color: #666; }
</style>
</head>
<body>

<header>
  <h1>JACE 採取・移植図ツール</h1>
  <span class="badge">試作版</span>
</header>

<div class="mode-switch">
  <button class="mode-btn active" id="btn-adult" onclick="switchMode('adult')">成人</button>
  <button class="mode-btn" id="btn-child" onclick="switchMode('child')">小児</button>
</div>

<div class="toolbar">
  <div class="toolbar-section">
    <span class="toolbar-label">部位</span>
    <button class="color-btn active" id="c-orange" style="background:#F97316" onclick="setColor('orange')" title="採皮部位"></button>
    <button class="color-btn" id="c-red" style="background:#EF4444" onclick="setColor('red')" title="受傷部位"></button>
    <button class="color-btn" id="c-blue" style="background:#3B82F6" onclick="setColor('blue')" title="移植部位"></button>
  </div>

  <div class="divider"></div>

  <div class="toolbar-section">
    <span class="toolbar-label">大きさ</span>
    <button class="size-btn active" id="s-large" onclick="setSize('large')">大</button>
    <button class="size-btn" id="s-medium" onclick="setSize('medium')">中</button>
    <button class="size-btn" id="s-small" onclick="setSize('small')">小</button>
  </div>

  <div class="divider"></div>

  <div class="toolbar-section">
    <button class="tool-btn active" id="t-marker" onclick="setTool('marker')">● マーカー</button>
    <button class="tool-btn" id="t-pen" onclick="setTool('pen')">✏ フリー描画</button>
  </div>

  <div class="divider"></div>

  <div class="toolbar-section">
    <button class="action-btn" onclick="undoLast()">↩ 戻す</button>
    <button class="action-btn danger" onclick="clearAll()">🗑 全消去</button>
    <button class="action-btn primary" onclick="downloadPNG()">⬇ PNG保存</button>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#F97316"></div> 採皮部位（オレンジ）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#EF4444"></div> 受傷部位（赤）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3B82F6"></div> 移植部位（青）</div>
</div>
<div class="hint">タップまたはクリックでマーカーを置けます。マーカーはドラッグで移動できます。</div>

const SIZES = { large: 22, medium: 15, small: 9 };
const COLORS = {
  orange: { fill: '#F97316', stroke: '#c2410c' },
  red:    { fill: '#EF4444', stroke: '#b91c1c' },
  blue:   { fill: '#3B82F6', stroke: '#1d4ed8' }
};

let canvas, bgImage;
let currentColor = 'orange';
let currentSize = 'large';
let currentTool = 'marker';
let currentMode = 'adult';
const history = [];

function initCanvas(mode) {
  const img = new Image();
  img.onload = () => {
    const maxW = Math.min(window.innerWidth - 32, 700);
    const scale = maxW / img.width;
    const w = Math.round(img.width * scale);
    const h = Math.round(img.height * scale);

    if (canvas) canvas.dispose();
    canvas = new fabric.Canvas('c', { width: w, height: h, selection: false });

    fabric.Image.fromURL(IMAGES[mode], (fImg) => {
      fImg.scaleToWidth(w);
      fImg.set({ left: 0, top: 0, selectable: false, evented: false, hasBorders: false, hasControls: false });
      canvas.add(fImg);
      canvas.sendToBack(fImg);
      bgImage = fImg;
    });

    canvas.on('mouse:down', onCanvasClick);
  };
  img.src = IMAGES[mode];
}

function onCanvasClick(opt) {
  if (currentTool !== 'marker') return;
  // 既存マーカーをクリックしたら削除
  const target = opt.target;
  if (target && target !== bgImage) {
    canvas.remove(target);
    const idx = history.indexOf(target);
    if (idx !== -1) history.splice(idx, 1);
    return;
  }
  const p = canvas.getPointer(opt.e);
  const r = SIZES[currentSize];
  const c = COLORS[currentColor];
  const circle = new fabric.Circle({
    left: p.x - r,
    top: p.y - r,
    radius: r,
    fill: c.fill + 'cc',
    stroke: c.stroke,
    strokeWidth: 2,
    hasControls: false,
    hasBorders: false,
    lockScalingX: true,
    lockScalingY: true,
    lockRotation: true,
  });
  canvas.add(circle);
  history.push(circle);
}

function setTool(t) {
  currentTool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('t-' + t).classList.add('active');

  if (t === 'pen') {
    canvas.isDrawingMode = true;
    const c = COLORS[currentColor];
    canvas.freeDrawingBrush.color = c.fill;
    canvas.freeDrawingBrush.width = SIZES[currentSize];
  } else {
    canvas.isDrawingMode = false;
  }
}

function setColor(col) {
  currentColor = col;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('c-' + col).classList.add('active');
  if (canvas && canvas.isDrawingMode) {
    canvas.freeDrawingBrush.color = COLORS[col].fill;
  }
}

function setSize(s) {
  currentSize = s;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('s-' + s).classList.add('active');
  if (canvas && canvas.isDrawingMode) {
    canvas.freeDrawingBrush.width = SIZES[s];
  }
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');
  history.length = 0;
  initCanvas(mode);
}

function undoLast() {
  if (history.length === 0) return;
  const obj = history.pop();
  canvas.remove(obj);
}

function clearAll() {
  if (!confirm('全てのマーカーを消去しますか？')) return;
  history.forEach(o => canvas.remove(o));
  history.length = 0;
  // remove freehand paths too
  canvas.getObjects().forEach(o => {
    if (o !== bgImage) canvas.remove(o);
  });
}

function downloadPNG() {
  const dataURL = canvas.toDataURL({ format: 'png', multiplier: 2 });
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = 'JACE図_' + new Date().toISOString().slice(0,10) + '.png';
  a.click();
}

initCanvas('adult');
</script>
